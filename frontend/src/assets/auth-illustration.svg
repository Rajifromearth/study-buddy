<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7048E8"/>
      <stop offset="100%" stop-color="#5A36C4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>

  <!-- Floating soft blobs -->
  <circle cx="90" cy="120" r="140" fill="#FF6B5B" opacity="0.15"/>
  <circle cx="520" cy="680" r="180" fill="#FF6B5B" opacity="0.12"/>
  <circle cx="480" cy="150" r="90" fill="#FFFFFF" opacity="0.08"/>

  <!-- Stack of "note cards" floating -->
  <g transform="translate(140, 260) rotate(-8)">
    <rect width="220" height="140" rx="16" fill="url(#cardGrad)" stroke="#FFFFFF" stroke-opacity="0.25"/>
    <rect x="24" y="28" width="140" height="10" rx="5" fill="#FFFFFF" opacity="0.5"/>
    <rect x="24" y="52" width="172" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="24" y="70" width="172" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="24" y="88" width="100" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <g transform="translate(210, 380) rotate(6)">
    <rect width="240" height="150" rx="16" fill="url(#cardGrad)" stroke="#FFFFFF" stroke-opacity="0.3"/>
    <circle cx="34" cy="34" r="12" fill="#FF6B5B"/>
    <rect x="58" y="26" width="150" height="10" rx="5" fill="#FFFFFF" opacity="0.55"/>
    <rect x="24" y="58" width="192" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="24" y="76" width="192" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="24" y="94" width="130" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <g transform="translate(160, 540) rotate(-4)">
    <rect width="200" height="120" rx="16" fill="url(#cardGrad)" stroke="#FFFFFF" stroke-opacity="0.25"/>
    <rect x="20" y="24" width="90" height="10" rx="5" fill="#FF6B5B" opacity="0.7"/>
    <rect x="20" y="46" width="160" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="20" y="64" width="160" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="20" y="82" width="110" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- small dots for texture -->
  <circle cx="460" cy="320" r="4" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="500" cy="400" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="90" cy="480" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="440" cy="600" r="5" fill="#FF6B5B" opacity="0.5"/>

  <!-- Headline text -->
  <text x="60" y="720" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">
    Your notes,
  </text>
  <text x="60" y="756" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">
    finally organized.
  </text>
</svg>
